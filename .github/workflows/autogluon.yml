name: Publish Autogluon image for production

on:
  push:
    branches: [main]
    paths:
      - 'autogluon/**'
  pull_request:
    branches: [main]
    paths:
      - 'autogluon/**'

env:
  REGISTRY: ghcr.io
  AUTOGLUON_NAME: ${{ github.repository }}_autogluon

concurrency:
  group: autogluon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run fast tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-autogluon-pip-${{ hashFiles('autogluon/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-autogluon-pip-

      - name: Install test dependencies
        working-directory: ./autogluon
        run: |
          python -m pip install --upgrade pip
          pip install "pandas>=0" "numpy>=0" "requests>=0" "flask>=0" "apscheduler>=0" "python-dotenv>=0" "pytest>=0"

      - name: Run fast pytest suite
        working-directory: ./autogluon
        run: pytest -q -m "not slow"

  build-autogluon:
    name: Build & push Docker image
    needs: tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.4.1

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (linux/amd64)
        uses: docker/build-push-action@v4
        with:
          context: ./autogluon/
          file: ./autogluon/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.AUTOGLUON_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.AUTOGLUON_NAME }}:${{ github.sha }}
